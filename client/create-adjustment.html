<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
    <link rel="manifest" href="./assets/site.webmanifest">
    <script src="./scripts/nav.js" defer></script>
    <script src="./scripts/auth.js" defer></script>
    <script src="./scripts/privileged.js" defer></script>
    <script src="./scripts/index.js" defer></script>
    <script src="./scripts/create_adjustment.js" defer></script>
    <title>IMS</title>
</head>
<body>
    <header>
        <div class="container-fluid text-white" id="headerWrapper">
            <div class="row align-items-center p-2">
                <div class="d-none d-md-block col-md-2">
                    <img src="assets/logo.png" alt="Logo" id="logo">
                </div>
                <div class="col col-md-8 my-2 text-center">
                    <h1>Inventory Management System</h1>
                </div>
                <div class="d-none d-md-block col-md-2 align-self-start text-end">
                    <p id="user-info"></p>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col">
                    <h2>Create Adjustment</h2>
                </div>
            </div>
            <div class="row border px-3 mb-4 pt-3">
                <label for="reason" class="form-label">Reason</label>
                <div class="input-group mb-3">
                    <textarea id="reason" class="form-control" placeholder="Reason" aria-label="Reason"></textarea>
                </div>
                <div class="input-group my-3">
                    <input type="number" class="form-control" placeholder="SKU/UPC" aria-label="Item number" id="itemNumber">
                    <input type="number" class="form-control" placeholder="New Quantity" aria-label="New Quantity" id="itemQuantity" min="0">
                    <button class="btn btn-primary" type="button" id="addItemButton">Add Item</button>
                </div>
                <div class="row mb-3 border-top pt-3">
                    <table class="table" id="createAdjustmentTable">
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>UPC</th>
                                <th>Description</th>
                                <th>Quantity Before</th>
                                <th>Quantity After</th>
                            </tr>
                        </thead>
                        <tbody id="itemList"></tbody>
                    </table>
                </div>
                <div class="row mb-3">
                    <button class="btn btn-secondary w-25 mt-3" id="suspendBtn">Suspend</button>
                    <button class="btn btn-primary w-25 mt-3" id="completeBtn">Complete</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Session expired modal -->
    <div class="modal fade" id="sessionExpiredModal" tabindex="-1" aria-labelledby="sessionExpiredModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sessionExpiredModalLabel">Session Expired</h5>
                </div>
                <div class="modal-body">Your session has expired due to inactivity. Please log in again.</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="sessionExpiredModalOk">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Completed Modal -->
    <div class="modal fade" id="completedModal" tabindex="-1" aria-labelledby="completedModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="completedModalLabel">Success</h5>
                </div>
                <div class="modal-body">
                    <p id="successMessage">Adjustment completed successfully.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" id="completedModalOk" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Suspended Modal -->
     <div class="modal fade" id="suspendedModal" tabindex="-1" aria-labelledby="suspendedModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="suspendedModalLabel">Suspended</h5>
                </div>
                <div class="modal-body">
                    <p id="suspendedMessage">Adjustment suspended successfully.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" id="suspendedModalOk" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
