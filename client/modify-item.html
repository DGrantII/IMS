<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
    <link rel="manifest" href="./assets/site.webmanifest">
    <script src="./scripts/nav.js" defer></script>
    <script src="./scripts/auth.js" defer></script>
    <script src="./scripts/admin.js" defer></script>
    <script src="./scripts/index.js" defer></script>
    <script src="./scripts/modify_item.js" defer></script>
    <title>IMS</title>
</head>
<body>
    <header>
        <div class="container-fluid text-white" id="headerWrapper">
            <div class="row align-items-center p-2">
                <div class="d-none d-md-block col-md-2">
                    <img src="assets/logo.png" alt="Logo" id="logo">
                </div>
                <div class="col col-md-8 my-2 text-center">
                    <h1>Inventory Management System</h1>
                </div>
                <div class="d-none d-md-block col-md-2 align-self-start text-end">
                    <p id="user-info"></p>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col">
                    <h2>Modify Item</h2>
                </div>
            </div>
            <div class="row border border-bottom-0 px-3 pt-3">
                <label for="upc" class="form-label">UPC</label>
                <div class="input-group mb-3">
                    <input id="upc" type="text" class="form-control" placeholder="UPC" aria-label="UPC">
                </div>
                <label for="model" class="form-label">Model Number</label>
                <div class="input-group mb-3">
                    <input id="model" type="text" class="form-control" placeholder="Model Number" aria-label="Model Number">
                </div>
                <label for="brand" class="form-label">Brand</label>
                <div class="input-group mb-3">
                    <input id="brand" type="text" class="form-control" placeholder="Brand" aria-label="Brand">
                </div>
                <label for="description" class="form-label">Description</label>
                <div class="input-group mb-3">
                    <textarea id="description" class="form-control" placeholder="Description" aria-label="Description"></textarea>
                </div>
                <label for="price" class="form-label">Price</label>
                <div class="input-group mb-3">
                    <input id="price" type="text" class="form-control" placeholder="Price" aria-label="Price">
                </div>
            </div>
            <div class="row border border-top-0 justify-content-end mb-4">
                <div class="col col-md-5 mb-3">
                    <button class="btn btn-primary w-100 mt-3" id="modifyBtn">Modify Item</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmationModalLabel">Confirm Action</h5>
                </div>
                <div class="modal-body">
                    Are you sure you want to modify this item?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmModifyBtn">Yes, Modify</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Session expired modal -->
    <div class="modal fade" id="sessionExpiredModal" tabindex="-1" aria-labelledby="sessionExpiredModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sessionExpiredModalLabel">Session Expired</h5>
                </div>
                <div class="modal-body">Your session has expired due to inactivity. Please log in again.</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="sessionExpiredModalOk">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Success</h5>
                </div>
                <div class="modal-body">
                    <p id="successMessage">Item modified successfully.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" id="successModalOk" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
